
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>360° Tour - Combined</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #ui-overlay {
        position: absolute; top: 10px; left: 10px; z-index: 100;
        background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px;
        max-height: 80vh; overflow-y: auto; width: 200px;
      }
      .hotspot-item {
        padding: 8px; cursor: pointer; border-bottom: 1px solid #ccc;
      }
      .hotspot-item:hover { background: #eee; }
      #site-plan-container {
        position: absolute; bottom: 20px; right: 20px; z-index: 100;
        width: 300px; height: 200px; background: rgba(0,0,0,0.5);
        border: 2px solid white; border-radius: 8px; overflow: hidden;
      }
      #site-plan-img { width: 100%; height: 100%; object-fit: contain; }
      .map-pin {
        position: absolute; width: 12px; height: 12px;
        background: red; border-radius: 50%; border: 2px solid white;
        transform: translate(-50%, -50%); cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <h3>Danh sách điểm</h3>
      <div id="hotspot-list"></div>
    </div>

    <div id="site-plan-container">
      <img id="site-plan-img" src="" />
      <div id="pins-container"></div>
    </div>

    <a-scene>
      <a-assets id="assets-container"></a-assets>
      <a-sky id="main-sky" rotation="0 -90 0"></a-sky>
      <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
      let projectData = null;

      async function init() {
        try {
          // Tự động load file project_data.json cùng thư mục
          const response = await fetch('project_data.json');
          if (!response.ok) throw new Error('Failed to load project_data.json');
          projectData = await response.json();
          renderTour();
        } catch (e) {
          console.error("Lỗi nạp dữ liệu:", e);
          alert("Vui lòng đảm bảo file project_data.json và các ảnh nằm cùng thư mục với file HTML này.");
        }
      }

      function renderTour() {
        const list = document.getElementById('hotspot-list');
        const pins = document.getElementById('pins-container');
        const assets = document.getElementById('assets-container');
        const sitePlanImg = document.getElementById('site-plan-img');
        
        if (projectData.sitePlan) {
          sitePlanImg.src = projectData.sitePlan;
        }

        projectData.hotspots.forEach((h, index) => {
          // Add assets
          const img = document.createElement('img');
          img.id = 'pano-' + h.id;
          img.src = h.imageData;
          assets.appendChild(img);

          // Add list item
          const item = document.createElement('div');
          item.className = 'hotspot-item';
          item.innerText = h.name;
          item.onclick = () => switchScene(h.id);
          list.appendChild(item);

          // Add map pin
          const pin = document.createElement('div');
          pin.className = 'map-pin';
          pin.style.left = h.x + '%';
          pin.style.top = h.y + '%';
          pin.title = h.name;
          pin.onclick = () => switchScene(h.id);
          pins.appendChild(pin);

          if (index === 0) switchScene(h.id);
        });
      }

      function switchScene(id) {
        const sky = document.getElementById('main-sky');
        sky.setAttribute('src', '#pano-' + id);
      }

      window.onload = init;
    </script>
  </body>
</html>
